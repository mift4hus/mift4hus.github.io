name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo utama
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 🔥 Clone repo external
      - name: Clone reverse-shell-generator
        run: |
          git clone https://github.com/tex2e/reverse-shell-generator.git

      # 📁 Prepare folder build (INI KUNCI)
      - name: Prepare static files
        run: |
          mkdir public

          # copy repo utama (root website)
          cp -r * public/ || true

          # hapus folder yang tidak perlu (optional)
          rm -rf public/.git

          # masukkan repo external ke subpath
          mkdir -p public/reverse-shell-generator
          cp -r reverse-shell-generator/* public/reverse-shell-generator/

      # 📦 Upload hasil build (bukan repo langsung)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      # 🚀 Deploy
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
